<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="ar-body-login">

  <div class="ar-body-inner">

    <div class="ar-container-login">

      <div class="ar-brand">
        <div class="ar-brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
        </div>
      </div>

      <h1 class="ar-title">Register</h1>
      <p class="ar-subtitle">Create your account to get started.</p>

      <div class="ar-field">
        <label class="ar-label" for="ar-email">Email</label>
        <div class="ar-input-wrap">
          <svg class="ar-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
          </svg>
          <input id="ar-email" class="ar-input" type="email" placeholder="Example@gmail.com" autocomplete="email" />
        </div>
        <div class="ar-error" id="ar-email-error">Please enter a valid email address.</div>
      </div>

      <div class="ar-field">
        <label class="ar-label" for="ar-password">Password</label>
        <div class="ar-input-wrap">
          <svg class="ar-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input id="ar-password" class="ar-input" type="password" placeholder="••••••••"
            autocomplete="new-password" />
          <button class="ar-toggle-pw" id="ar-toggle-pw" type="button" tabindex="-1" aria-label="Toggle password">
            <svg class="ar-eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <div class="ar-error" id="ar-password-error">Password must be at least 6 characters.</div>
      </div>

      <div class="ar-field">
        <label class="ar-label" for="ar-password-confirm">Confirm Password</label>
        <div class="ar-input-wrap">
          <svg class="ar-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
          <input id="ar-password-confirm" class="ar-input" type="password" placeholder="••••••••" />
          <button class="ar-toggle-pw" id="ar-toggle-confirm" type="button" tabindex="-1" aria-label="Toggle password">
            <svg class="ar-eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <div class="ar-error" id="ar-confirm-error">Passwords do not match.</div>
      </div>

      <button class="ar-button" id="ar-login-btn">Register</button>

    </div>

  </div>

  <footer class="ar-footer">
    &copy; 2025 <span>Sirb</span>. All rights reserved.
  </footer>

  <script>
    // Elements
    const emailInput = document.getElementById('ar-email');
    const emailError = document.getElementById('ar-email-error');
    const passwordInput = document.getElementById('ar-password');
    const passwordError = document.getElementById('ar-password-error');
    const confirmInput = document.getElementById('ar-password-confirm');
    const confirmError = document.getElementById('ar-confirm-error');
    const registerBtn = document.getElementById('ar-login-btn');

    // Toggle Buttons
    const togglePw = document.getElementById('ar-toggle-pw');
    const toggleConfirm = document.getElementById('ar-toggle-confirm');

    // SVG Constants
    const EYE_OPEN = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const EYE_SHUT = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    /**
     * Set up password toggle functionality for a specific field
     */
    function setupPasswordToggle(button, input) {
      button.addEventListener('click', () => {
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        
        // Find the SVG inside the clicked button and change its path
        const icon = button.querySelector('.ar-eye-icon');
        icon.innerHTML = isHidden ? EYE_SHUT : EYE_OPEN;
      });
    }

    // Initialize both toggles
    setupPasswordToggle(togglePw, passwordInput);
    setupPasswordToggle(toggleConfirm, confirmInput);

    /* Function to validate email format */
    function validateEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email.toLowerCase());
    }

    /* Input cleaning (remove errors on type) */
    [emailInput, passwordInput, confirmInput].forEach(input => {
      input.addEventListener('input', () => {
        input.classList.remove('ar-error-input');
        const errId = input.id === 'ar-email' ? 'ar-email-error' : (input.id === 'ar-password' ? 'ar-password-error' : 'ar-confirm-error');
        document.getElementById(errId).classList.remove('ar-visible');
      });
    });

    /* Form Submission */
    registerBtn.addEventListener('click', () => {
      let valid = true;

      /* Email Validation */
      if (!validateEmail(emailInput.value.trim())) {
        emailInput.classList.add('ar-error-input');
        emailError.classList.add('ar-visible');
        valid = false;
      }

      /* Password length check */
      if (passwordInput.value.length < 6) {
        passwordInput.classList.add('ar-error-input');
        passwordError.classList.add('ar-visible');
        valid = false;
      }

      /* Confirm password check */
      if (confirmInput.value !== passwordInput.value || !confirmInput.value) {
        confirmInput.classList.add('ar-error-input');
        confirmError.classList.add('ar-visible');
        valid = false;
      }

      if (!valid) return;

      registerBtn.disabled = true;
      registerBtn.textContent = 'Creating Account...';
      
      // Simulate success
      setTimeout(() => { 
        window.location.href = 'Homepage.html'; 
      }, 1200);
    });
  </script>

</body>

</html>
